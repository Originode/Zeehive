# Local Postgres for the ZEEHIVE meta database.
# Runs on host :5445 to avoid colliding with any project Postgres (OmniBiz dev uses 5434).
#
# `name:` is pinned deliberately. Compose otherwise derives the project name — and therefore the
# VOLUME PREFIX — from the directory it is run from, so renaming this folder would make compose
# look for a volume that doesn't exist and silently bring up an EMPTY meta database. The stack's
# identity must not depend on where the repo happens to sit on disk.
name: zeehive

services:
  db:
    image: postgres:17-alpine
    container_name: zeehive_db
    environment:
      POSTGRES_USER: zeehive
      POSTGRES_PASSWORD: zeehive
      POSTGRES_DB: zeehive
    ports:
      - "${ZEEHIVE_DB_PORT:-5445}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zeehive -d zeehive"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
