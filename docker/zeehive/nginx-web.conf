# The production dashboard's server half: static SPA + /api proxy to the queenzee on the host.
server {
  listen 5180;
  root /usr/share/nginx/html;

  # The queenzee API — host process (self-ship pattern) reached through Docker Desktop's
  # host gateway. SSE rides this too, hence: no buffering (a live stream must not sit in a
  # proxy buffer), HTTP/1.1 with the Connection header cleared, and a read timeout long enough
  # that an idle dashboard tab's event stream is never cut mid-day.
  location /api/ {
    proxy_pass http://host.docker.internal:4700;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 24h;
  }

  # SPA fallback — client-side routes resolve to the app shell.
  location / {
    try_files $uri /index.html;
  }
}
