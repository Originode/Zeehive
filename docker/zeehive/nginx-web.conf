# The production dashboard's server half: static SPA + /api proxy to the queenzee on the host.
#
# One /api proxy carries THREE kinds of traffic to the queenzee: plain JSON, the SSE event
# stream, and the cxell-zee terminal WEBSOCKET. The map makes Connection correct for each —
# 'upgrade' when the client sends an Upgrade header (the websocket), empty otherwise (SSE must
# NOT get a Connection: upgrade, and a persistent stream wants it cleared).
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      '';
}
server {
  listen 5180;
  root /usr/share/nginx/html;

  # The queenzee API — host process (self-ship pattern) reached through Docker Desktop's
  # host gateway. SSE + websocket ride this too, hence: no buffering (a live stream must not sit
  # in a proxy buffer), HTTP/1.1 with Upgrade/Connection driven by the map, and a read timeout
  # long enough that an idle event stream or terminal is never cut mid-day.
  location /api/ {
    proxy_pass http://host.docker.internal:4700;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 24h;
  }

  # SPA fallback — client-side routes resolve to the app shell.
  location / {
    try_files $uri /index.html;
  }
}
