# ZEEHIVE production on machine 'local' (docker context desktop-linux).
#
#   docker --context desktop-linux compose -f docker/zeehive/docker-compose.prod.yml up -d --build web
#
# web    — LIVE: the production dashboard (built bundle behind nginx, /api proxied to the
#          queenzee). This is what http://10.1.0.15:5180 serves.
# server — EXPERIMENTAL (profile): the containerized queenzee. Builds today; goes live only
#          after the repo migration to the Linux side (see Dockerfile.server header). Until
#          then the queenzee runs on the host via the self-ship pattern.
name: zeehive-prod
services:
  # The meta-DB — ZEEHIVE's single source of truth, LIVE on machine 'local' (migrated off
  # ugreen-nas 2026-07-18: every Zeehive prod container belongs on the machine its prod site
  # names, the meta-db included; and the queenzee that reads it runs on this host anyway, so
  # colocating removes the network from every query). Port 5445 kept from the ugreen era so the
  # DATABASE_URL only changes host. The data lives in the zeehive_db_data volume; the old ugreen
  # container is kept STOPPED as a cold fallback of the pre-migration state.
  db:
    image: postgres:17-alpine
    container_name: zeehive_db
    restart: unless-stopped
    ports: ["5445:5432"]
    environment:
      POSTGRES_USER: zeehive
      POSTGRES_PASSWORD: zeehive
      POSTGRES_DB: zeehive
    volumes:
      - zeehive_db_data:/var/lib/postgresql/data
    labels:
      zeehive.project: Zeehive
      zeehive.role: db

  web:
    build: { context: ../.., dockerfile: docker/zeehive/Dockerfile.web }
    image: zeehive-web:prod
    container_name: zeehive_web
    restart: unless-stopped
    ports: ["5180:5180"]
    labels:
      zeehive.project: Zeehive
      zeehive.role: webapp

  # The NEW ERA's meta-DB (decided 2026-07-20): the containerized queenzee starts from a FRESH
  # database — nothing is ever migrated from the old zeehive_db above, which keeps serving the
  # host-era instance until it retires. Its own named volume; 5447 on the host for humans/psql.
  meta-db:
    profiles: ["experimental"]
    image: postgres:17-alpine
    container_name: zeehive_meta_db
    restart: unless-stopped
    ports: ["5447:5432"]
    environment:
      POSTGRES_USER: zeehive
      POSTGRES_PASSWORD: zeehive
      POSTGRES_DB: zeehive
    volumes:
      - zeehive_meta_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zeehive"]
      interval: 5s
      timeout: 3s
      retries: 20
    labels:
      zeehive.project: Zeehive
      zeehive.role: db

  server:
    profiles: ["experimental"]
    build: { context: ../.., dockerfile: docker/zeehive/Dockerfile.server }
    image: zeehive-server:prod
    container_name: zeehive_server_ctr    # _ctr: never shadow the live host process's row name
    restart: unless-stopped
    ports: ["4701:4700"]                  # 4701 while experimental — the host queenzee owns 4700
    depends_on:
      meta-db: { condition: service_healthy }
    environment:
      # Defaults to the NEW era's own meta-db (same compose network — it can never resolve to the
      # old zeehive_db, so the two-queenzees-one-meta-DB failure class stays impossible). The
      # ZEEHIVE_DATABASE_URL override remains for pointing a scratch instance elsewhere.
      DATABASE_URL: ${ZEEHIVE_DATABASE_URL:-postgres://zeehive:zeehive@meta-db:5432/zeehive}
      DOCKER_HOST: unix:///var/run/docker.sock  # 'default' context = the mounted local daemon
      PROVISION_MODE: ${ZEEHIVE_CTR_PROVISION_MODE:-real}   # worktrees are real here — they live
                                                            # on the container's own /repos volume
      ZEEHIVE_CTX_UGREEN: tcp://10.1.0.18:2375   # remote contexts, created by the entrypoint
      ZEEHIVE_CTX_MARDALE: tcp://10.2.0.16:2375
      REPOS_DIR: /repos                    # clone-from-GitHub destination default
      # Self-onboard on a fresh meta-DB (lib/self-onboard.js): where ZEEHIVE clones ITSELF from.
      # The repo is private — put ZEEHIVE_GITHUB_TOKEN in docker/zeehive/.env (gitignored) once
      # and every fresh run self-onboards unattended; without it, boot logs the gap and the
      # console onboarding remains.
      ZEEHIVE_SELF_REMOTE: https://github.com/Originode/Zeehive.git
      ZEEHIVE_GITHUB_TOKEN: ${ZEEHIVE_GITHUB_TOKEN:-}
      ZEEHIVE_SSH_DIR: /data/ssh           # fleet cxell keypair — regenerating it orphans live cxells
      BACKUP_DIR: /backups                 # prod DB dumps
      ZEEHIVE_CXELL_SSH: network            # SSH to cxells by container name over zee-hive-net
      CXELL_API_BASE: http://host.docker.internal:4701   # cxells must call THIS instance: it
                                           # publishes 4701 while experimental. Cutover flips the
                                           # port mapping to 4700 — drop this line then (the code
                                           # default is host.docker.internal:4700).
    volumes:
      - zeehive_repos:/repos                        # the migrated project folders (Linux-native git)
      - /var/run/docker.sock:/var/run/docker.sock   # the local daemon; TCP contexts for the rest
      - zeehive_ssh:/data/ssh
      - zeehive_backups:/backups
    # zee-hive-net is NOT declared in compose — the entrypoint creates and self-joins it
    # idempotently (a compose-owned or external declaration fights pre-existing networks).
    labels:
      zeehive.project: Zeehive
      zeehive.role: server

volumes:
  # New-era volumes carry EXPLICIT names: compose otherwise prefixes them with the project name
  # (zeehive-prod_zeehive_repos), which silently diverges from every script that mounts the bare
  # name — the self-ship sibling would recreate the server against an EMPTY repos volume (found
  # live 2026-07-20: a "cleanup" hit the auto-created bare-name volume while the server kept the
  # prefixed one). zeehive_db_data keeps the prefix: it is the OLD era's meta-DB data, bound to
  # the live zeehive_db container — renaming it would detach real data.
  zeehive_repos: { name: zeehive_repos }
  zeehive_db_data:
  zeehive_meta_data: { name: zeehive_meta_data }
  zeehive_ssh: { name: zeehive_ssh }
  zeehive_backups: { name: zeehive_backups }
