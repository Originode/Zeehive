# ZEEHIVE production — the BUILD-FROM-SOURCE twin of docker-compose.bootstrap.yml.
#
#   docker compose -f docker/zeehive/docker-compose.prod.yml up -d --build web
#
# Bootstrap PULLS published images; this file BUILDS the same stack from the checkout. They must
# therefore describe the SAME stack: same project name, same container names, same ports, same
# host aliases. That is not tidiness — self-ship drives THIS file (scripts/ship-zeehive-web.sh,
# scripts/self-ship-container.sh) against containers that bootstrap created, and `container_name`
# is a global docker namespace. When the two disagreed (`zeehive-prod` here vs `zeehive` there),
# every ship from a bootstrap-booted queenzee died on
#   "Conflict. The container name /zeehive_web is already in use"
# because compose recreates containers it OWNS and refuses ones labelled for another project.
# Found 2026-07-22 on the first from-zero boot that tried to ship: the bootstrap file was added
# with `name: zeehive` while these scripts already targeted `zeehive-prod`, and nothing had ever
# exercised the two together.
#
# The rule this file now lives by: if you change identity here (name, container_name, ports,
# extra_hosts), change it in docker-compose.bootstrap.yml too, or ships break on fresh installs.
#
# Why identity fixes must land HERE and not in the scripts: the ship runs
# `container.build_script` from /app (baked into the SERVER IMAGE, which lags master until the
# image is republished) but reads this compose file from $SRC = project.repo_root = the checkout
# git just landed. A fix in this file reaches a fresh `docker pull` install immediately; a fix in
# the scripts does not reach it until the image is rebuilt and pushed.
name: zeehive
services:
  # The meta-DB — ZEEHIVE's single source of truth, LIVE on machine 'local' (migrated off
  # ugreen-nas 2026-07-18: every Zeehive prod container belongs on the machine its prod site
  # names, the meta-db included; and the queenzee that reads it runs on this host anyway, so
  # colocating removes the network from every query). Port 5445 kept from the ugreen era so the
  # DATABASE_URL only changes host. The data lives in the zeehive_db_data volume; the old ugreen
  # container is kept STOPPED as a cold fallback of the pre-migration state.
  # NOT part of the shippable stack — the host era's archive, kept behind a profile so an
  # unscoped `up` in project 'zeehive' can never start it alongside the live containers.
  db:
    profiles: ["archive"]
    image: postgres:17-alpine
    container_name: zeehive_db
    restart: unless-stopped
    ports: ["5445:5432"]
    environment:
      POSTGRES_USER: zeehive
      POSTGRES_PASSWORD: zeehive
      POSTGRES_DB: zeehive
    volumes:
      - zeehive_db_data:/var/lib/postgresql/data
    labels:
      zeehive.project: Zeehive
      zeehive.role: db

  web:
    build: { context: ../.., dockerfile: docker/zeehive/Dockerfile.web }
    image: zeehive-web:prod
    container_name: zeehive_web
    restart: unless-stopped
    ports: ["5180:5180"]
    # nginx-web.conf proxies /api to host.docker.internal:4700, a name that does NOT resolve on
    # native Linux without this alias. Bootstrap has it; when this file did not, a webapp ship
    # recreated the container without it and took /api down on exactly the fresh-install path
    # nobody tests. Keep the two in lockstep.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # NO depends_on here, deliberately — bootstrap has one because it boots the whole stack in
    # order, but self-ship runs `up -d --no-build web` and compose acts on a service's WHOLE
    # dependency chain. With `depends_on: [server]` the webapp ship recreated server and meta-db
    # too: it killed the running queenzee mid-ship and left a half-created container behind
    # (observed 2026-07-22 on the cold-boot verification). A role ship must touch ONE container.
    # depends_on is orchestration, not identity — this is the one field the two files may differ on.
    labels:
      zeehive.project: Zeehive
      zeehive.role: webapp

  # The NEW ERA's meta-DB (decided 2026-07-20): the containerized queenzee starts from a FRESH
  # database — nothing is ever migrated from the old zeehive_db above, which keeps serving the
  # host-era instance until it retires. Its own named volume.
  # No host port, matching bootstrap: `server` depends_on this, so ANY difference in its config
  # would make compose recreate the database container on every server ship. `docker exec
  # zeehive_meta_db psql -U zeehive` is the access path.
  meta-db:
    image: postgres:17-alpine
    container_name: zeehive_meta_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: zeehive
      POSTGRES_PASSWORD: zeehive
      POSTGRES_DB: zeehive
    volumes:
      - zeehive_meta_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zeehive"]
      interval: 5s
      timeout: 3s
      retries: 20
    labels:
      zeehive.project: Zeehive
      zeehive.role: db

  server:
    build: { context: ../.., dockerfile: docker/zeehive/Dockerfile.server }
    image: zeehive-server:prod
    # Identity is bootstrap's, exactly. It was `zeehive_server_ctr` on 4701 to avoid shadowing the
    # host-era queenzee that owned 4700 — that era is over, and the mismatch was actively harmful:
    # under one project name compose matches by SERVICE label, so a server ship would have found
    # the running `zeehive_server` and replaced it with a differently-named container on a port
    # the web container's nginx does not proxy to.
    container_name: zeehive_server
    restart: unless-stopped
    ports: ["4700:4700"]
    depends_on:
      meta-db: { condition: service_healthy }
    environment:
      # Defaults to the NEW era's own meta-db (same compose network — it can never resolve to the
      # old zeehive_db, so the two-queenzees-one-meta-DB failure class stays impossible). The
      # ZEEHIVE_DATABASE_URL override remains for pointing a scratch instance elsewhere.
      DATABASE_URL: ${ZEEHIVE_DATABASE_URL:-postgres://zeehive:zeehive@meta-db:5432/zeehive}
      DOCKER_HOST: unix:///var/run/docker.sock  # 'default' context = the mounted local daemon
      PROVISION_MODE: ${ZEEHIVE_CTR_PROVISION_MODE:-real}   # worktrees are real here — they live
                                                            # on the container's own /repos volume
      ZEEHIVE_CTX_UGREEN: tcp://10.1.0.18:2375   # remote contexts, created by the entrypoint
      ZEEHIVE_CTX_MARDALE: tcp://10.2.0.16:2375
      REPOS_DIR: /repos                    # clone-from-GitHub destination default
      # Self-onboard on a fresh meta-DB (lib/self-onboard.js): where ZEEHIVE clones ITSELF from.
      # The repo is private — put ZEEHIVE_GITHUB_TOKEN in docker/zeehive/.env (gitignored) once
      # and every fresh run self-onboards unattended; without it, boot logs the gap and the
      # console onboarding remains.
      ZEEHIVE_SELF_REMOTE: https://github.com/Originode/Zeehive.git
      ZEEHIVE_GITHUB_TOKEN: ${ZEEHIVE_GITHUB_TOKEN:-}
      ZEEHIVE_SSH_DIR: /data/ssh           # fleet cxell keypair — regenerating it orphans live cxells
      BACKUP_DIR: /backups                 # prod DB dumps
      # Real backups + armed scheduler, same defaults as docker-compose.bootstrap.yml (keep the
      # two in step). Unset means 'simulate', which records a ~150-byte placeholder as a finished
      # backup — see 9169c1b for why that is worse than having no backup at all.
      MAINTENANCE_MODE: ${MAINTENANCE_MODE:-real}
      MAINTENANCE_ENABLED: ${MAINTENANCE_ENABLED:-true}
      # Worktree-only provisioning — same default and same reason as docker-compose.bootstrap.yml
      # (keep the two in step). See provision.js: the code default is ON, and that default is what
      # produced 396 orphaned worktrees against a cloned project with no .env.
      PROVISION_APP_TIER: ${PROVISION_APP_TIER:-false}
      ZEEHIVE_CXELL_SSH: network            # SSH to cxells by container name over zee-hive-net
      # cxells reach the queenzee by SERVICE NAME over zee-hive-net — no host-networking
      # assumption, so this works the same on Docker Desktop and native Linux. Same value as
      # bootstrap; see the identity rule in the header.
      CXELL_IMAGE: ${CXELL_IMAGE:-ghcr.io/originode/zeehive-zee-agent:latest}
      CXELL_API_BASE: http://zeehive_server:4700
    volumes:
      - zeehive_repos:/repos                        # the migrated project folders (Linux-native git)
      - /var/run/docker.sock:/var/run/docker.sock   # the local daemon; TCP contexts for the rest
      - zeehive_ssh:/data/ssh
      - zeehive_backups:/backups
    # zee-hive-net is NOT declared in compose — the entrypoint creates and self-joins it
    # idempotently (a compose-owned or external declaration fights pre-existing networks).
    labels:
      zeehive.project: Zeehive
      zeehive.role: server

volumes:
  # New-era volumes carry EXPLICIT names: compose otherwise prefixes them with the project name
  # (zeehive-prod_zeehive_repos), which silently diverges from every script that mounts the bare
  # name — the self-ship sibling would recreate the server against an EMPTY repos volume (found
  # live 2026-07-20: a "cleanup" hit the auto-created bare-name volume while the server kept the
  # prefixed one). zeehive_db_data keeps the prefix: it is the OLD era's meta-DB data, bound to
  # the live zeehive_db container — renaming it would detach real data.
  zeehive_repos: { name: zeehive_repos }
  zeehive_db_data:
  zeehive_meta_data: { name: zeehive_meta_data }
  zeehive_ssh: { name: zeehive_ssh }
  zeehive_backups: { name: zeehive_backups }
