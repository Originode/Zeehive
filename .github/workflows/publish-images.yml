# Publish the three ZEEHIVE images to ghcr on every push to master, so the bootstrap compose
# (docker-compose.bootstrap.yml) can run the whole system with NO local checkout or build.
# This is GitHub-side automation only — it builds and publishes packages; nothing here (or
# anywhere) pushes code. Mark's hand-push of master is what triggers it.
name: publish-images
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: zeehive-server
            context: .
            dockerfile: docker/zeehive/Dockerfile.server
          - image: zeehive-web
            context: .
            dockerfile: docker/zeehive/Dockerfile.web
          - image: zeehive-zee-agent
            context: docker/zeehive
            dockerfile: docker/zeehive/Dockerfile.zee-agent
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          # amd64 first; add linux/arm64 once the zee-agent npm install is verified there
          platforms: linux/amd64
          tags: |
            ghcr.io/originode/${{ matrix.image }}:latest
            ghcr.io/originode/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
