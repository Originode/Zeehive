# ZEEHIVE — one-file bootstrap. No checkout, no build: published images only.
#
#   curl -fsSLO https://raw.githubusercontent.com/Originode/Zeehive/master/docker-compose.bootstrap.yml
#   docker compose -f docker-compose.bootstrap.yml up -d
#
# On first boot the server migrates its own fresh meta-DB, then SELF-ONBOARDS: it clones the
# ZEEHIVE repo from GitHub into the repos volume and registers it as its first project. Console
# on http://localhost:5180 (API :4700). Connect a Claude token in Project setup → Tokens, raise
# the pool target, and dispatch. Fresh restart-from-zero = delete the zeehive_meta_data and
# zeehive_repos volumes and `up -d` again.
#
# Run your own fork: override ZEEHIVE_SELF_REMOTE (and ZEEHIVE_GITHUB_TOKEN for a private repo —
# a fine-grained PAT with Contents: Read-only) in a .env file next to this one.
#
# Onboard a project that lives on YOUR machine (instead of cloning it): the console does this
# for you — Onboard → Existing folder → "mount a folder from the host machine…" (the queenzee
# recreates its own container to take the bind; mounts persist in /repos/.zeehive-mounts.yml).
# The manual equivalent, if you prefer to own the compose invocation —
#   # mount-my-project.yml
#   services:
#     server:
#       volumes:
#         - D:\Repos\MyProject:/repos/MyProject     # host path : container path
#   docker compose -f docker-compose.bootstrap.yml -f mount-my-project.yml up -d
# Know the tradeoffs: Docker Desktop bind mounts are much slower than the named volume for
# git-heavy work, a Windows checkout brings CRLF along, and the queenzee's zees write that tree —
# don't fight them from a host editor mid-run. Clone-from-GitHub remains the smoothest path.
name: zeehive
services:
  meta-db:
    image: postgres:17-alpine
    container_name: zeehive_meta_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: zeehive
      POSTGRES_PASSWORD: zeehive
      POSTGRES_DB: zeehive
    volumes:
      - zeehive_meta_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zeehive"]
      interval: 5s
      timeout: 3s
      retries: 20

  server:
    # Overridable so a stack that has SHIPPED itself is not silently reverted. Ships replace these
    # containers with locally built images (zeehive-server:prod / zeehive-web:prod); re-running
    # `up -d` here — to add an env var, say — reconciles them straight back to the published tag
    # and undoes the deploy with no warning. If you build from source, set ZEEHIVE_SERVER_IMAGE and
    # ZEEHIVE_WEB_IMAGE in the .env next to this file.
    image: ${ZEEHIVE_SERVER_IMAGE:-ghcr.io/originode/zeehive-server:latest}
    container_name: zeehive_server
    restart: unless-stopped
    ports: ["4700:4700"]
    depends_on:
      meta-db: { condition: service_healthy }
    environment:
      DATABASE_URL: postgres://zeehive:zeehive@meta-db:5432/zeehive
      DOCKER_HOST: unix:///var/run/docker.sock
      PROVISION_MODE: real
      REPOS_DIR: /repos
      ZEEHIVE_SELF_REMOTE: ${ZEEHIVE_SELF_REMOTE:-https://github.com/Originode/Zeehive.git}
      ZEEHIVE_GITHUB_TOKEN: ${ZEEHIVE_GITHUB_TOKEN:-}
      ZEEHIVE_SSH_DIR: /data/ssh
      BACKUP_DIR: /backups
      # Backups are REAL by default. Left unset, maintenance.js falls back to 'simulate', which
      # writes a ~150-byte comment file and records it as a finished backup — indistinguishable in
      # the UI from a real dump of a 4.5GB production database, and one click from restoring
      # nothing over a live DB (see 9169c1b). Simulate is a demo mode; opt INTO it, never into it
      # by omission. MAINTENANCE_ENABLED arms the scheduler; MODE decides real vs placeholder.
      MAINTENANCE_MODE: ${MAINTENANCE_MODE:-real}
      MAINTENANCE_ENABLED: ${MAINTENANCE_ENABLED:-true}
      # Worktree-only provisioning by default. The app tier runs the PROJECT's own spin-env.sh,
      # which needs the main checkout's .env — a file a fresh `git clone` never has, because it is
      # gitignored. provision.js defaults this ON, so a containerized queenzee provisioning a
      # cloned project failed on every attempt (2026-07-22: 396 orphaned worktrees, 139GB, engine
      # wedged). Turn it on per-install once the project's dev tier is genuinely wired up.
      PROVISION_APP_TIER: ${PROVISION_APP_TIER:-false}
      # cxells (the zees' containers) are spawned from the published image and reach the
      # queenzee by service name over zee-hive-net — no host networking assumptions, so this
      # works the same on Docker Desktop (win/mac) and native Linux.
      CXELL_IMAGE: ghcr.io/originode/zeehive-zee-agent:latest
      CXELL_API_BASE: http://zeehive_server:4700
      ZEEHIVE_CXELL_SSH: network
    volumes:
      - zeehive_repos:/repos
      - /var/run/docker.sock:/var/run/docker.sock
      - zeehive_ssh:/data/ssh
      - zeehive_backups:/backups
    # zee-hive-net (the cxell network) is deliberately NOT declared here: the entrypoint creates
    # and joins it idempotently — a compose-owned network would refuse any pre-existing one.

  web:
    image: ${ZEEHIVE_WEB_IMAGE:-ghcr.io/originode/zeehive-web:latest}
    container_name: zeehive_web
    restart: unless-stopped
    ports: ["5180:5180"]
    # the bundled nginx proxies /api → host.docker.internal:4700 (the server's published port);
    # host-gateway makes that name resolve on native Linux too
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: [server]

volumes:
  # explicit names: scripts (e.g. the self-ship sibling) mount these by bare name
  zeehive_meta_data: { name: zeehive_meta_data }
  zeehive_repos: { name: zeehive_repos }
  zeehive_ssh: { name: zeehive_ssh }
  zeehive_backups: { name: zeehive_backups }
